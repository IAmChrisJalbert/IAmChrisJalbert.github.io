<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | IAmChrisJalbert</title>
    <!-- This script pulls in the Tailwind CSS to make the dark theme work perfectly in plain HTML -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0a0c] text-slate-200 font-sans selection:bg-blue-500/30 flex flex-col">

    <!-- Navigation -->
    <nav class="border-b border-white/5 bg-black/20 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">C</div>
    <span class="font-bold tracking-tight text-white">IAmChrisJalbert.com</span>
</a>
            <div class="flex gap-6 text-sm font-medium">
                <a href="index.html" class="hover:text-blue-400 transition-colors">Apps</a>
                <a href="privacy.html" class="hover:text-blue-400 transition-colors">Privacy</a>
                <a href="contact.html" class="text-blue-500 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Contact Form Content -->
    <main class="flex-grow max-w-3xl mx-auto px-6 py-24 w-full">
        <section class="bg-white/5 border border-white/10 rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <h1 class="text-3xl md:text-4xl font-black text-white mb-2 tracking-tighter italic">GET IN <span class="text-blue-500">TOUCH</span></h1>
            <p class="text-slate-400 mb-8">Have a question about the "Simply" collection or want to reach out? Drop a message below.</p>
            
            <!-- 
              IMPORTANT: To make this form work:
              1. Go to https://formspree.io/ and create a free account.
              2. Create a "New Form" and it will give you a special URL endpoint.
              3. Replace "YOUR_FORMSPREE_ENDPOINT_HERE" below with that URL.
            -->
            <form action="https://formspree.io/f/xzdkqdoy" method="POST" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Name Field -->
                    <div class="space-y-2">
                        <label for="name" class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Your Name</label>
                        <input type="text" id="name" name="name" required
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
                            placeholder="e.g. John Doe">
                    </div>
                    
                    <!-- Email Field -->
                    <div class="space-y-2">
                        <label for="email" class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Your Email</label>
                        <input type="email" id="email" name="email" required
                            class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
                            placeholder="e.g. hello@example.com">
                    </div>
                </div>

                <!-- Subject Field -->
                <div class="space-y-2">
                    <label for="subject" class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Subject</label>
                    <input type="text" id="subject" name="subject" required
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
                        placeholder="App support, feedback, etc.">
                </div>

                <!-- Message Field -->
                <div class="space-y-2">
                    <label for="message" class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Message</label>
                    <textarea id="message" name="message" rows="5" required
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors resize-none"
                        placeholder="How can I help you?"></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20 mt-4 flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    Send Message
                </button>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-12 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-xs font-medium text-slate-600 uppercase tracking-widest">
                © 2026 IAmChrisJalbert | Built in Gloucester, MA
            </p>
            <div class="flex gap-8 text-[10px] font-black uppercase tracking-widest text-slate-500">
                <a href="privacy.html" class="hover:text-white transition-colors">Privacy Policies</a>
                <a href="contact.html" class="hover:text-white transition-colors">Contact</a>
                <span class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg> Source
                </span>
            </div>
        </div>
    </footer>

</body>
</html>
