<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Console Live Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const statsCol = collection(db, 'artifacts', appId, 'public', 'data', 'tester_stats');
                onSnapshot(statsCol, (snapshot) => {
                    snapshot.forEach((d) => {
                        const data = d.data();
                        const el = document.getElementById(`count-${d.id}`);
                        const bar = document.getElementById(`bar-${d.id}`);
                        const timeEl = document.getElementById(`time-${d.id}`);
                        
                        if (el) {
                            el.innerText = data.count;
                            // Updated Goal to 14
                            bar.style.width = `${Math.min((data.count / 14) * 100, 100)}%`;
                            if (data.updatedAt) {
                                const date = new Date(data.updatedAt);
                                timeEl.innerText = `Auto-Synced: ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                            }
                        }
                    });
                });
            }
        });
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .progress-bar { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="bg-[#0a0a0c] text-white font-sans min-h-screen">
    <div class="max-w-md mx-auto p-6 space-y-8">
        
        <header class="pt-8 pb-4 flex justify-between items-end border-b border-white/5">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">CONSOLE <span class="text-blue-500">LIVE</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-2">Gloucester Operations ⚓</p>
            </div>
            <div class="bg-blue-500/10 border border-blue-500/20 px-3 py-1.5 rounded-full">
                <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest animate-pulse">Automatic Sync Active</span>
            </div>
        </header>

        <div class="grid gap-4">
            <!-- Simply Connect -->
            <div class="bg-white/5 border border-white/10 rounded-[2rem] p-6 space-y-4">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="font-black text-lg tracking-tight uppercase italic">Simply Connect</h2>
                        <p id="time-connect" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Awaiting automated sync...</p>
                    </div>
                    <div class="text-right">
                        <span class="text-white font-black text-4xl tabular-nums leading-none"><span id="count-connect">--</span></span>
                        <span class="text-slate-600 font-bold text-sm block">/ 14</span>
                    </div>
                </div>
                <div class="h-3 w-full bg-white/5 rounded-full overflow-hidden p-0.5 border border-white/5">
                    <div id="bar-connect" class="h-full bg-blue-500 rounded-full progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <!-- Simply Sip -->
            <div class="bg-white/5 border border-white/10 rounded-[2rem] p-6 space-y-4">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="font-black text-lg tracking-tight uppercase italic">Simply Sip</h2>
                        <p id="time-sip" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Awaiting automated sync...</p>
                    </div>
                    <div class="text-right">
                        <span class="text-white font-black text-4xl tabular-nums leading-none"><span id="count-sip">--</span></span>
                        <span class="text-slate-600 font-bold text-sm block">/ 14</span>
                    </div>
                </div>
                <div class="h-3 w-full bg-white/5 rounded-full overflow-hidden p-0.5 border border-white/5">
                    <div id="bar-sip" class="h-full bg-emerald-500 rounded-full progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <!-- Simply Minesweeper -->
            <div class="bg-white/5 border border-white/10 rounded-[2rem] p-6 space-y-4">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="font-black text-lg tracking-tight uppercase italic">Simply Minesweeper</h2>
                        <p id="time-minesweeper" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Awaiting automated sync...</p>
                    </div>
                    <div class="text-right">
                        <span class="text-white font-black text-4xl tabular-nums leading-none"><span id="count-minesweeper">--</span></span>
                        <span class="text-slate-600 font-bold text-sm block">/ 14</span>
                    </div>
                </div>
                <div class="h-3 w-full bg-white/5 rounded-full overflow-hidden p-0.5 border border-white/5">
                    <div id="bar-minesweeper" class="h-full bg-purple-500 rounded-full progress-bar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <footer class="text-center pt-8">
            <p class="text-[9px] text-slate-700 font-black uppercase tracking-[0.3em]">IAmChrisJalbert.com | Full Automation Engine</p>
        </footer>
    </div>
</body>
</html>
