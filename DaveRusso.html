<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dave Russo | Official Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: sans-serif; }

        /* HEADER */
        header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        
        /* HERO - Pointing to images/ folder */
        .hero { 
            height: 60vh; 
            background: url('images/hero.jpg') center/cover; 
            display: flex; align-items: center; justify-content: center; flex-direction: column; 
        }
        h1 { font-size: 5rem; text-transform: uppercase; }

        /* GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .video-box { aspect-ratio: 16/9; background: #222; }

        /* TRUST BAR - Pointing to images/ folder */
        .trust-bar { display: flex; justify-content: center; gap: 40px; padding: 40px; }
        .trust-bar img { height: 40px; }

        /* FOOTER */
        footer { text-align: center; padding: 40px; color: #666; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <header>
        <nav>PORTFOLIO | BOOKING | GALLERY</nav>
    </header>

    <div class="hero">
        <h1>DAVE RUSSO</h1>
        <p>ENTERTAINER</p>
    </div>

    <div class="grid">
        <div class="video-box"><iframe src="YOUR_YOUTUBE_1" width="100%" height="100%"></iframe></div>
        <div class="video-box"><iframe src="YOUR_YOUTUBE_2" width="100%" height="100%"></iframe></div>
    </div>

    <section class="trust-bar">
        <img src="images/nbc.png" alt="NBC">
        <img src="images/espn.png" alt="ESPN">
    </section>

    <footer>
        <p>&copy; 2026 DAVE RUSSO MEDIA. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
