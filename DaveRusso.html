<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVE RUSSO | PORTFOLIO</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Oswald', sans-serif; overflow-x: hidden; }

        /* CINEMATIC HERO */
        .hero { 
            height: 100vh; 
            background: url('hero.jpg') center/cover; 
            display: flex; align-items: center; justify-content: center;
            animation: zoom 20s infinite alternate;
        }
        @keyframes zoom { from { transform: scale(1); } to { transform: scale(1.05); } }
        .hero-overlay { text-align: center; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); padding: 50px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 8rem; letter-spacing: -5px; line-height: 0.9; }
        .sub { color: #e74c3c; font-size: 2rem; letter-spacing: 10px; }

        /* GLASS CONTENT */
        .content-wrap { max-width: 1000px; margin: -100px auto 0; padding: 50px; background: rgba(20,20,20,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* LOGOS */
        .trust-row { display: flex; justify-content: center; gap: 50px; padding: 40px; }
        .trust-row img { height: 40px; opacity: 0.5; filter: grayscale(1) brightness(2); }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-overlay">
            <h1>DAVE RUSSO</h1>
            <p class="sub">ENTERTAINER</p>
        </div>
    </header>

    <main class="content-wrap">
        <div class="grid">
            <div style="background:#222; aspect-ratio:16/9;"></div>
            <div style="background:#222; aspect-ratio:16/9;"></div>
        </div>

        <section class="trust-row">
            <img src="nbc.png" alt="NBC">
            <img src="espn.png" alt="ESPN">
        </section>
    </main>

</body>
</html>
