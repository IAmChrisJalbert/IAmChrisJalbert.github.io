<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dave Russo | Official Portfolio</title>
    <style>
        /* Efficient Reset */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: #fff; }

        /* Hero */
        .hero { height: 85vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,1)), url('hero.jpg') center/cover; display: flex; flex-direction: column; justify-content: flex-end; padding: 50px; }
        h1 { font-size: clamp(3rem, 10vw, 6rem); text-transform: uppercase; }
        
        /* Media Strip */
        .media-strip { background: #111; padding: 20px; display: flex; justify-content: center; gap: 40px; align-items: center; border-bottom: 2px solid #e74c3c; }
        .media-strip img { height: 30px; filter: grayscale(100%) brightness(2); opacity: 0.7; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .video-wrapper { aspect-ratio: 16/9; background: #222; }

        /* Booking */
        .booking { max-width: 600px; margin: 40px auto; padding: 40px; background: #0a0a0a; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; }
        button { width: 100%; padding: 15px; background: #e74c3c; color: #fff; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>DAVE RUSSO</h1>
        <p>THE ENTERTAINER</p>
    </header>

    <section class="media-strip">
        <img src="nbc.png" alt="NBC">
        <img src="espn.png" alt="ESPN">
    </section>

    <main class="grid">
        <div class="video-wrapper"><iframe src="YOUR_URL_1" width="100%" height="100%" allowfullscreen></iframe></div>
        <div class="video-wrapper"><iframe src="YOUR_URL_2" width="100%" height="100%" allowfullscreen></iframe></div>
    </main>

    <section class="booking">
        <form action="https://formspree.io/f/YOUR_ID" method="POST">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" placeholder="Event Details"></textarea>
            <button type="submit">Submit Inquiry</button>
        </form>
    </section>

</body>
</html>
