<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dave Russo | The Entertainer</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #000; color: #fff; }
        .hero { 
            height: 80vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images/dave.jpeg'); 
            background-size: cover; 
            background-position: center 20%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { font-size: 3.5rem; margin: 0; text-transform: uppercase; }
        .cta { background: #e74c3c; color: white; padding: 15px 30px; text-decoration: none; font-weight: bold; margin-top: 20px; display: inline-block; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>DAVE RUSSO</h1>
        <p>THE ENTERTAINER</p>
        <a href="#book" class="cta">BOOK NOW</a>
    </header>

    <div class="container">
        <h2>ABOUT DAVE</h2>
        <p>From the Boston Comedy Festival to Wayne Newton's <em>The Entertainer</em>, Dave Russo is a powerhouse of comedy. A seasoned TV personality, emcee, and performer, Dave brings high-energy, quick wit, and artful storytelling to every stage.</p>
        
        <h2 id="book">BOOK DAVE</h2>
        <form action="https://formspree.io/f/YOUR_UNIQUE_ID" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Event Details" rows="5" required></textarea>
            <button type="submit" style="background:#e74c3c; color:white; border:none; padding:15px; width:100%; cursor:pointer;">SUBMIT</button>
        </form>
    </div>

</body>
</html>
